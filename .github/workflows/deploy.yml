name: Deploy valesmelendez

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            git config --global --add safe.directory ${{ secrets.APP_PATH }}
            cd ${{ secrets.APP_PATH }}
            git pull origin master
            composer install --no-dev --optimize-autoloader
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            chown -R beto:beto /home/beto/web/valesmelendez.jbpo.dev/public_html/laravel
            chmod -R 775 /home/beto/web/valesmelendez.jbpo.dev/public_html/laravel/storage
            chmod -R 775 /home/beto/web/valesmelendez.jbpo.dev/public_html/laravel/bootstrap/cache
